<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <title>Frames - Thread & Hooks</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #fff8f2;
            text-align: center;
        }

        header {
            background-color: #d98c8c;
            color: white;
            padding: 20px;
        }

        iframe {
            margin: 20px;
            border: 2px solid #d98c8c;
        }
    </style>
</head>

<body>

<header>
    <h1>Frames Demo 🖼️</h1>
</header>

<h2>YouTube Tutorial (Inline Frame)</h2>

<!-- YouTube iframe -->
<iframe width="400" height="250" 
src="https://www.youtube.com/embed/5ea4yHn1pME" 
title="Crochet Tutorial">
</iframe>

<hr>

<h2>Google Map (Floating Frame)</h2>

<!-- Google Map iframe -->
<iframe 
    src="https://www.google.com/maps?q=Delhi&output=embed"
    width="400" 
    height="250">
</iframe>

<hr>

<h2>Internal Page in Frame</h2>

<!-- Internal page iframe -->
<iframe src="products.html" width="400" height="250"></iframe>

</body>
</html>
