<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <title>Styled Page - Thread & Hooks</title>

    <style>
        body {
            font-family: 'Arial';
            background-color: #fff8f2;
            margin: 0;
        }

        header {
            background-color: #d98c8c;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 28px;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }

        .card {
            background-color: white;
            border: 2px solid #d98c8c;
            border-radius: 10px;
            width: 250px;
            padding: 15px;
            text-align: center;
            box-shadow: 2px 2px 10px gray;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            color: #d98c8c;
        }

        .card p {
            font-size: 16px;
        }

        .card button {
            background-color: #d98c8c;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .card button:hover {
            background-color: #b36b6b;
        }
    </style>
</head>

<body>

<header>
    Thread & Hooks - Featured Collection 🧶
</header>

<div class="container">

    <div class="card">
        <img src="bag.jpg" alt="Bag">
        <h3>Crochet Bag</h3>
        <p>Stylish handmade tote bag.</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="scarf.jpg" alt="Scarf">
        <h3>Warm Scarf</h3>
        <p>Perfect for winter season.</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="cap.jpg" alt="Cap">
        <h3>Woolen Cap</h3>
        <p>Comfortable and trendy.</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
